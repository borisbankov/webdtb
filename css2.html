<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		div:hover{
			opacity:0.75;
		}
		.bg-red{
			background: #b90000;
			padding:50px 50px 0px 50px;
		}
		.bg-green{
			background: #4c9c01;
			padding:20px 20px 0px 20px;
		}
		.bg-blue{
			background: #0081cc;
			padding:30px 30px 0px 30px;
		}
		.bg-purple{
			background: #4902a7;
			padding:40px 40px 0px 40px;
		}
		.bg-yellow{
			background: #f3e300;
		}
		.bg-orange{
			background: #ffa600;
			padding:10px 10px 0px 10px;
		}
	</style>		
</head>
<body>
	<div class="bg-red">
		<div class="bg-purple">
			<div class="bg-blue">				
				<div class="bg-green">
					<div class="bg-orange">Hover here</div>
				</div>
			</div>
		</div>
	</div>
</body>
</html>
