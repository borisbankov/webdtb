<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		*{
			box-sizing: border-box;
		}
		.nav{
			list-style-type: none;
			display: flex;
			justify-content: center;
			background: #2b6666;
			padding:15px 0px;
		}
		.nav-item{
			border-right:solid 2px white;
			padding:10px;
		}
		.nav-item:last-child{
			border-right: none;
		}
		.nav-link{
			/*margin-left:5px;*/
			color: white;
			text-decoration: none;
			font-family: Arial;
			font-size:18px;
			padding:10px;
		}
		.nav-link:hover{
			background: white;
			color:#2b6666;

		}
	</style>
</head>
<body>
	<ul class="nav">
		<li class="nav-item">
			<a href="#" class="nav-link">Home</a>
		</li>
		<li class="nav-item">
			<a href="#" class="nav-link">About</a>
		</li>
		<li class="nav-item">
			<a href="#" class="nav-link">Services</a>
		</li>
		<li class="nav-item">
			<a href="#" class="nav-link">Contact</a>
		</li>
	</ul>
</body>
</html>
