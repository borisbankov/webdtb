<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<form action="" method="POST">
		<legend>
			<table>
				<tr>
					<td>
						<b><label for="title">Title</label></b>
					</td>
					<td>
						<input type="text" id="title" value="Boris">
					</td>
				</tr>
				<tr>
					<td>
						<b><label for="author">Author</label></b>
					</td>
					<td>
						<select name="author" id="author">
							<option value="">-----</option>
							<option value="1">Dostoevsky</option>
							<option value="2">Bosilek</option>
							<option value="3">Dickens</option>
						</select>
					</td>
				</tr>
				<tr>
					<td>
						<b><label for="">Summary:</label></b>
					</td>
					<td>
						<textarea name="" id="" rows="16" cols="40"></textarea>
						<br>
						Enter a brief description
					</td>
				</tr>
				<tr>
					<td>
						<b><label for="">ISBN</label></b>
					</td>
					<td>
						<input type="text">
						<br>
						13 Character ISBN number
					</td>
				</tr>
				<tr>
					<td>
						<b><label for="">Genre</label></b>
					</td>
					<td>
						<select name="" id="" multiple>
							<option value="1">Science Fiction</option>
							<option value="2">Fantasy</option>
							<option value="3">Western</option>
							<option value="4">French Poetry</option>
						</select>
					</td>
				</tr>
				<tr>
					<td>
						<b><label for="language">Language</label></b>
					</td>
					<td>
						<select name="language" id="language">
							<option value="">-----</option>
							<option value="1">English</option>
							<option value="2">Bulgarian</option>
							<option value="3">German</option>
						</select>
					</td>
				</tr>
				<tr>
					<td>
						<input type="submit" value="Click me">
					</td>
				</tr>
			</table>
			
		</legend>
	</form>
</body>
</html>
