<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<h1>Events Page</h1>
	<form action="">
		<fieldset>
			<legend>Events Page</legend>
			<label for="">Event Name:</label>
			<br>
			<input type="text" value="Multisport Gala 2021">
			<br>
			<label for="">Sports:</label>
			<br>
			<select name="" id="">
				<option value="1">Baseball</option>
				<option value="2">Ice Hockay</option>
			</select>
			<br>
			<label for="">Location:</label>
			<br>
			<select name="" id="">
				<option value="1">1st Street</option>
				<option value="2">2nd Boulevard</option>
			</select>
			<br>
			<label for="">Time:</label>
			<br>
			<input type="text" value="mm/dd/yyyy --:-- --">
			<br>
			<label for="">Number of players:</label>
			<br>
			<input type="text" placeholder="Insert number of players">
			<br>	
			<label for="">Minimum Skill Level:</label>
			<br>
			<input type="radio" name="min">
			<label for="">1</label>
			<input type="radio" name="min">
			<label for="">2</label>
			<input type="radio" name="min">
			<label for="">3</label>
			<input type="radio" name="min">
			<label for="">4</label>
			<input type="radio" name="min">
			<label for="">5</label>
			<br>	
			<label for="">Maximum Skill Level:</label>
			<br>
			<input type="radio" name="max">
			<label for="">1</label>
			<input type="radio" name="max">
			<label for="">2</label>
			<input type="radio" name="max">
			<label for="">3</label>
			<input type="radio" name="max">
			<label for="">4</label>
			<input type="radio" name="max">
			<label for="">5</label>
			<br>
			<br>
			Creator: yjkimb
			<br> 
			<input type="submit" value="Send">
		</fieldset>

	</form>
</body>
</html>
