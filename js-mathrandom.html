<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
</head>
<body>
	<h1></h1>
	<input type="button" value="по-малко" id="max">
	<input type="button" value="по-голямо" id="min">
	<script>
		
		let rnd = (min, max) => {
			let random = Math.floor(Math.random()*(max - min + 1) + min); 
			heading.innerText = random;
		}
		// Math.random() vryshta chislo v diapazona [0, 1), t.e. moje da e 0, 0.1, 0.23, 0.55121213555556456578, 0.999999999999999 no ne i 1.0
		let min = 1;
		let max = 1000;
		let heading = document.querySelector('h1');
		rnd(min, max);

		document.querySelector('#max').addEventListener('click', (e) => {
			max = parseInt(heading.innerText) - 1;
			rnd(min, max);
		});
		document.querySelector('#min').addEventListener('click', (e) => {
			min = parseInt(heading.innerText) + 1;
			rnd(min, max);
		});
	</script>
</body>
</html>
